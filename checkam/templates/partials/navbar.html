<header class="navbar" aria-label="Main Header">
  <div class="navbar__left">
    <button class="navbar__toggle" aria-label="Toggle Sidebar" id="sidebarToggle">
      <i class="fas fa-bars"></i>
    </button>
    <div class="navbar__greeting">
      <span class="greeting-label">{{ greeting }},</span>
      <span class="greeting-name">{{ request.user.first_name }}</span>
    </div>
  </div>
  <div class="navbar__right">
    <a href="{% url 'settings' %}" class="navbar__avatar" title="Settings">
      {{ request.user.first_name|first|upper }}
    </a>
  </div>
</header>
