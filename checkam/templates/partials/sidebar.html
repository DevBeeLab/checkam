{% if request.user.is_authenticated %}
<nav class="sidebar" aria-label="Main Navigation">

  <div class="sidebar__brand">
    <a href="{% url 'dashboard' %}" class="brand-logo">check<span>am</span></a>
  </div>

  <div class="sidebar__user-info">
    <div class="user-avatar-placeholder">{{ request.user.first_name|first|upper }}</div>
    <div class="user-info-text">
      <span class="user-display-name">{{ request.user.get_full_name }}</span>
      <span class="user-display-email">{{ request.user.email }}</span>
    </div>
  </div>

  <ul class="sidebar__nav">
    <li class="nav-item">
      <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}nav-link--active{% endif %}">
        <span class="nav-icon"><i class="fas fa-home"></i></span>
        <span class="nav-text">Dashboard</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'transactions' %}" class="nav-link {% if request.resolver_match.url_name == 'transactions' %}nav-link--active{% endif %}">
        <span class="nav-icon"><i class="fas fa-money-bill-wave"></i></span>
        <span class="nav-text">Transactions</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'budgets' %}" class="nav-link {% if request.resolver_match.url_name == 'budgets' %}nav-link--active{% endif %}">
        <span class="nav-icon"><i class="fas fa-wallet"></i></span>
        <span class="nav-text">Budgets</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'reports' %}" class="nav-link {% if request.resolver_match.url_name == 'reports' %}nav-link--active{% endif %}">
        <span class="nav-icon"><i class="fas fa-chart-line"></i></span>
        <span class="nav-text">Reports</span>
      </a>
    </li>
    <li class="nav-item">
      <a href="{% url 'settings' %}" class="nav-link {% if request.resolver_match.url_name == 'settings' %}nav-link--active{% endif %}">
        <span class="nav-icon"><i class="fas fa-cog"></i></span>
        <span class="nav-text">Settings</span>
      </a>
    </li>
  </ul>

  <div class="sidebar__footer">
    <a href="{% url 'logout' %}" class="logout-link">
      <i class="fas fa-sign-out-alt"></i>
      <span>Logout</span>
    </a>
  </div>

</nav>
{% endif %}
